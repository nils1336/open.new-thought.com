<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KI-Readiness-Check für Unternehmen | new.thought</title>
  <meta name="description" content="Wo steht Ihr Unternehmen bei KI? 24 gezielte Fragen, 6 Dimensionen, sofortige Auswertung mit Netzgraf und konkreten Handlungsempfehlungen. Kostenlos." />
  <link rel="canonical" href="https://new-thought.de/ki-readiness-check.html" />
  <meta property="og:title" content="KI-Readiness-Check | new.thought" />
  <meta property="og:description" content="Wie bereit ist Ihr Unternehmen für KI? 24 Fragen, 6 Dimensionen, Netzgraf-Auswertung." />
  <meta property="og:type" content="website" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
  <style>
    :root {
      --accent: #ff3eb5;
      --accent-dim: rgba(255,62,181,0.10);
      --ink: #0e0e0c;
      --ink-mid: #6b6b68;
      --bg: #ffffff;
      --bg-soft: #f5f4f0;
      --rule: #e2e1db;
      --sans: 'Inter', system-ui, sans-serif;
      --mono: 'JetBrains Mono', monospace;
      --radius: 12px;
      --shadow: 0 1px 12px rgba(0,0,0,0.06);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body { font-family: var(--sans); background: var(--bg-soft); color: var(--ink); min-height: 100vh; }

    /* ─── NAV ─── */
    .nav {
      position: fixed; top: 0; left: 0; right: 0;
      background: var(--bg); border-bottom: 1px solid var(--rule);
      z-index: 200; height: 60px;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 40px;
    }
    .nav-logo { font-size: 16px; font-weight: 800; text-decoration: none; color: var(--ink); letter-spacing: -0.02em; }
    .nav-logo span { color: var(--accent); }
    .nav-right { display: flex; align-items: center; gap: 20px; }
    .nav-back { font-size: 13px; color: var(--ink-mid); text-decoration: none; }
    .nav-back:hover { color: var(--ink); }
    .nav-cta {
      font-size: 13px; font-weight: 600;
      background: var(--ink); color: #fff;
      padding: 8px 16px; border-radius: 6px;
      text-decoration: none; transition: background .15s;
    }
    .nav-cta:hover { background: var(--accent); }

    /* ─── PROGRESS ─── */
    .progress-wrap {
      position: fixed; top: 60px; left: 0; right: 0;
      height: 3px; background: var(--rule); z-index: 199;
    }
    .progress-fill {
      height: 100%; background: var(--accent);
      transition: width .5s cubic-bezier(.4,0,.2,1);
      width: 0%;
    }

    /* ─── MAIN ─── */
    .main { padding-top: 63px; min-height: 100vh; }
    .screen { display: none; }
    .screen.active { display: block; animation: fadeUp .3s ease both; }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ─── INTRO ─── */
    .intro-wrap {
      max-width: 820px; margin: 0 auto;
      padding: 72px 32px 80px; text-align: center;
    }
    .eyebrow {
      font-family: var(--mono); font-size: 11px;
      letter-spacing: .2em; text-transform: uppercase;
      color: var(--accent); margin-bottom: 18px;
    }
    .intro-h1 {
      font-size: clamp(38px,6vw,66px); font-weight: 900;
      line-height: 1.04; letter-spacing: -.035em; margin-bottom: 22px;
    }
    .intro-sub {
      font-size: 17px; line-height: 1.65; color: var(--ink-mid);
      max-width: 540px; margin: 0 auto 36px;
    }
    .btn-start {
      display: inline-flex; align-items: center; gap: 10px;
      background: var(--ink); color: #fff;
      font-family: var(--sans); font-size: 15px; font-weight: 700;
      letter-spacing: -.01em; padding: 16px 32px; border-radius: 8px;
      border: none; cursor: pointer; text-decoration: none;
      transition: background .15s, transform .15s;
    }
    .btn-start:hover { background: var(--accent); transform: translateY(-1px); }
    .intro-stats {
      display: flex; gap: 40px; justify-content: center; margin-top: 52px;
      padding-top: 36px; border-top: 1px solid var(--rule);
    }
    .stat-num { font-size: 32px; font-weight: 900; letter-spacing: -.02em; }
    .stat-lbl { font-family: var(--mono); font-size: 10px; letter-spacing: .18em; text-transform: uppercase; color: var(--ink-mid); margin-top: 3px; }
    .intro-dims {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px;
      margin-top: 44px; text-align: left;
    }
    .intro-dim {
      background: var(--bg); border: 1px solid var(--rule);
      border-radius: var(--radius); padding: 18px 20px;
    }
    .intro-dim-icon { width: 28px; height: 28px; margin-bottom: 10px; color: var(--ink); }
    .intro-dim-name { font-size: 13px; font-weight: 700; }
    .intro-dim-desc { font-size: 12px; color: var(--ink-mid); margin-top: 3px; line-height: 1.5; }

    /* ─── QUIZ ─── */
    .quiz-wrap {
      max-width: 760px; margin: 0 auto;
      padding: 44px 28px 80px;
    }
    .dim-header {
      display: flex; align-items: center; gap: 16px; margin-bottom: 36px;
    }
    .dim-badge {
      width: 44px; height: 44px; border-radius: 50%;
      background: var(--ink); color: #fff;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .dim-badge svg { width: 20px; height: 20px; }
    .dim-meta { flex: 1; }
    .dim-eyebrow { font-family: var(--mono); font-size: 10px; letter-spacing: .18em; text-transform: uppercase; color: var(--accent); margin-bottom: 2px; }
    .dim-title { font-size: 22px; font-weight: 800; letter-spacing: -.02em; }
    .dim-counter { font-family: var(--mono); font-size: 11px; color: var(--ink-mid); }

    .q-card {
      background: var(--bg); border: 1.5px solid var(--rule);
      border-radius: var(--radius); padding: 26px 28px; margin-bottom: 14px;
      transition: border-color .2s;
    }
    .q-card.answered { border-color: var(--accent); }
    .q-num { font-family: var(--mono); font-size: 10px; letter-spacing: .15em; text-transform: uppercase; color: var(--ink-mid); margin-bottom: 8px; }
    .q-text { font-size: 15px; font-weight: 600; line-height: 1.55; margin-bottom: 20px; }

    .opts { display: flex; flex-direction: column; gap: 7px; }
    .opt {
      display: flex; align-items: flex-start; gap: 12px;
      padding: 10px 14px; border-radius: 8px;
      border: 1.5px solid var(--rule); background: var(--bg);
      cursor: pointer; transition: all .13s; user-select: none;
    }
    .opt:hover { border-color: var(--accent); background: var(--accent-dim); }
    .opt.sel { border-color: var(--accent); background: var(--accent-dim); }
    .opt-dot {
      width: 18px; height: 18px; border-radius: 50%;
      border: 2px solid var(--rule); flex-shrink: 0; margin-top: 1px;
      display: flex; align-items: center; justify-content: center;
      transition: all .13s;
    }
    .opt.sel .opt-dot { background: var(--accent); border-color: var(--accent); }
    .opt.sel .opt-dot::after { content: ''; width: 6px; height: 6px; border-radius: 50%; background: #fff; }
    .opt-txt { font-size: 13.5px; line-height: 1.5; }

    /* Quiz nav */
    .quiz-nav {
      display: flex; align-items: center; justify-content: space-between;
      margin-top: 28px; gap: 12px;
    }
    .btn-back {
      padding: 12px 22px; border: 1.5px solid var(--rule); border-radius: 8px;
      background: none; font-family: var(--sans); font-size: 14px; font-weight: 500;
      color: var(--ink-mid); cursor: pointer; transition: all .13s;
    }
    .btn-back:hover { border-color: var(--ink); color: var(--ink); }
    .q-status { font-family: var(--mono); font-size: 11px; color: var(--ink-mid); }
    .btn-next {
      display: inline-flex; align-items: center; gap: 8px;
      background: var(--ink); color: #fff;
      font-family: var(--sans); font-size: 14px; font-weight: 700;
      padding: 12px 26px; border-radius: 8px; border: none; cursor: pointer;
      transition: background .13s;
    }
    .btn-next:hover:not(:disabled) { background: var(--accent); }
    .btn-next:disabled { opacity: .35; cursor: not-allowed; }

    /* ─── EMAIL GATE ─── */
    .email-wrap {
      max-width: 560px; margin: 0 auto;
      padding: 80px 28px 80px; text-align: center;
    }
    .email-icon {
      width: 68px; height: 68px; border-radius: 50%;
      background: var(--accent-dim); border: 1.5px solid rgba(255,62,181,.2);
      display: flex; align-items: center; justify-content: center;
      font-size: 30px; margin: 0 auto 24px;
    }
    .email-h2 { font-size: 34px; font-weight: 900; letter-spacing: -.025em; margin-bottom: 12px; }
    .email-sub { font-size: 15px; color: var(--ink-mid); line-height: 1.65; margin-bottom: 36px; }
    .email-row { display: flex; gap: 10px; margin-bottom: 10px; }
    .email-input {
      flex: 1; padding: 14px 18px;
      border: 1.5px solid var(--rule); border-radius: 8px;
      font-family: var(--sans); font-size: 15px;
      background: var(--bg); color: var(--ink); outline: none;
      transition: border-color .15s;
    }
    .email-input:focus { border-color: var(--accent); }
    .btn-submit {
      background: var(--ink); color: #fff;
      font-family: var(--sans); font-size: 14px; font-weight: 700;
      padding: 14px 24px; border-radius: 8px; border: none; cursor: pointer;
      transition: background .13s; white-space: nowrap;
    }
    .btn-submit:hover { background: var(--accent); }
    .email-error { font-size: 13px; color: var(--accent); margin-top: 6px; display: none; }
    .email-error.show { display: block; }
    .email-privacy { font-size: 12px; color: var(--ink-mid); line-height: 1.6; }

    /* ─── RESULTS ─── */
    .results-wrap {
      max-width: 920px; margin: 0 auto;
      padding: 40px 28px 80px;
    }
    .results-hero { text-align: center; margin-bottom: 48px; }
    .score-badge {
      display: inline-block;
      background: var(--ink); color: #fff;
      border-radius: 16px; padding: 22px 44px;
      margin-bottom: 20px;
    }
    .score-lbl { font-family: var(--mono); font-size: 10px; letter-spacing: .2em; text-transform: uppercase; opacity: .6; margin-bottom: 6px; }
    .score-num { font-size: 60px; font-weight: 900; line-height: 1; letter-spacing: -.03em; }
    .score-max { font-size: 20px; font-weight: 400; opacity: .5; }
    .results-h2 { font-size: 26px; font-weight: 800; letter-spacing: -.02em; margin-bottom: 8px; }
    .results-sub { font-size: 15px; color: var(--ink-mid); max-width: 520px; margin: 0 auto; }

    /* Radar */
    .radar-box {
      background: var(--bg); border: 1px solid var(--rule);
      border-radius: var(--radius); padding: 36px 32px;
      margin-bottom: 28px; box-shadow: var(--shadow);
    }
    .radar-box h3 {
      font-size: 13px; font-family: var(--mono); letter-spacing: .15em;
      text-transform: uppercase; color: var(--ink-mid); margin-bottom: 24px; text-align: center;
    }
    .radar-inner { max-width: 520px; margin: 0 auto; }

    /* Dimension cards */
    .dim-grid {
      display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px;
      margin-bottom: 32px;
    }
    .dim-card {
      background: var(--bg); border: 1px solid var(--rule);
      border-radius: var(--radius); padding: 24px; box-shadow: var(--shadow);
    }
    .dc-head { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 14px; }
    .dc-left { display: flex; align-items: center; gap: 11px; }
    .dc-icon { width: 22px; height: 22px; color: var(--ink-mid); flex-shrink: 0; }
    .dc-name { font-size: 14px; font-weight: 700; }
    .dc-level { font-family: var(--mono); font-size: 10px; letter-spacing: .1em; text-transform: uppercase; color: var(--ink-mid); margin-top: 3px; }
    .dc-score { font-size: 28px; font-weight: 900; color: var(--accent); line-height: 1; }
    .dc-score span { font-size: 13px; font-weight: 400; color: var(--ink-mid); }
    .dc-bar-bg { height: 5px; background: var(--rule); border-radius: 3px; overflow: hidden; margin-bottom: 16px; }
    .dc-bar { height: 100%; background: var(--accent); border-radius: 3px; transition: width 1.2s cubic-bezier(.34,1.56,.64,1); }
    .dc-insight {
      font-size: 13px; line-height: 1.65; color: var(--ink-mid);
      padding-bottom: 14px; margin-bottom: 14px;
      border-bottom: 1px solid var(--rule);
    }
    .dc-rec-lbl { font-family: var(--mono); font-size: 10px; letter-spacing: .15em; text-transform: uppercase; color: var(--accent); margin-bottom: 6px; }
    .dc-rec { font-size: 13px; line-height: 1.65; color: var(--ink); }
    .dc-cta {
      display: inline-flex; align-items: center; gap: 5px;
      font-size: 12px; font-weight: 700; color: var(--accent);
      text-decoration: none; margin-top: 10px;
    }
    .dc-cta:hover { text-decoration: underline; }

    /* Results footer CTA */
    .results-cta-box {
      background: var(--ink); color: #fff;
      border-radius: 16px; padding: 48px 40px; text-align: center;
    }
    .rcta-eyebrow { font-family: var(--mono); font-size: 10px; letter-spacing: .2em; text-transform: uppercase; color: rgba(255,255,255,.5); margin-bottom: 14px; }
    .rcta-h3 { font-size: 28px; font-weight: 900; letter-spacing: -.025em; margin-bottom: 12px; }
    .rcta-sub { font-size: 15px; line-height: 1.65; opacity: .7; max-width: 480px; margin: 0 auto 28px; }
    .rcta-btn {
      display: inline-flex; align-items: center; gap: 8px;
      background: var(--accent); color: #fff;
      font-family: var(--sans); font-size: 15px; font-weight: 700;
      padding: 16px 32px; border-radius: 8px; text-decoration: none;
      transition: opacity .15s;
    }
    .rcta-btn:hover { opacity: .88; }

    /* ─── BENEFITS ─── */
    .intro-benefits {
      margin: 36px 0 0; text-align: left;
    }
    .intro-benefits-lbl {
      font-family: var(--mono); font-size: 10px;
      letter-spacing: .18em; text-transform: uppercase;
      color: var(--ink-mid); margin-bottom: 16px; text-align: center;
    }
    .intro-benefits-grid {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px;
    }
    .intro-benefit {
      background: var(--bg); border: 1px solid var(--rule);
      border-radius: var(--radius); padding: 20px 18px;
    }
    .intro-benefit-icon {
      width: 34px; height: 34px; border-radius: 8px;
      background: var(--accent-dim); color: var(--accent);
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 12px;
    }
    .intro-benefit-icon svg { width: 18px; height: 18px; }
    .intro-benefit-title { font-size: 13px; font-weight: 700; margin-bottom: 5px; }
    .intro-benefit-desc { font-size: 12px; color: var(--ink-mid); line-height: 1.55; }

    /* ─── PROFILE PANEL ─── */
    .profile-box {
      background: var(--bg); border: 1px solid var(--rule);
      border-radius: var(--radius); padding: 28px 32px;
      margin-bottom: 20px; box-shadow: var(--shadow);
    }
    .profile-type-row { margin-bottom: 14px; }
    .profile-badge {
      display: inline-block;
      background: var(--ink); color: #fff;
      font-family: var(--mono); font-size: 10px;
      letter-spacing: .18em; text-transform: uppercase;
      padding: 5px 13px; border-radius: 5px;
    }
    .profile-desc {
      font-size: 15px; line-height: 1.7; color: var(--ink);
      margin-bottom: 22px;
    }
    .profile-dims {
      display: grid; grid-template-columns: 1fr 1fr; gap: 16px;
    }
    .profile-side-lbl {
      font-family: var(--mono); font-size: 10px;
      letter-spacing: .15em; text-transform: uppercase;
      color: var(--ink-mid); margin-bottom: 8px;
    }
    .profile-dim-item {
      display: flex; align-items: center;
      justify-content: space-between;
      padding: 8px 12px; border-radius: 6px;
      margin-bottom: 6px; font-size: 13px;
    }
    .profile-dim-item.strong {
      background: rgba(34,197,94,0.07);
      border: 1px solid rgba(34,197,94,0.22);
    }
    .profile-dim-item.weak {
      background: var(--accent-dim);
      border: 1px solid rgba(255,62,181,0.22);
    }
    .profile-dim-name { font-weight: 600; color: var(--ink); }
    .profile-dim-item.strong .profile-dim-score { color: #16a34a; font-weight: 700; font-family: var(--mono); font-size: 12px; }
    .profile-dim-item.weak   .profile-dim-score { color: var(--accent); font-weight: 700; font-family: var(--mono); font-size: 12px; }

    /* Responsive */
    @media (max-width: 680px) {
      .nav { padding: 0 18px; }
      .intro-dims { grid-template-columns: repeat(2,1fr); }
      .intro-stats { gap: 22px; }
      .quiz-wrap, .results-wrap { padding-left: 16px; padding-right: 16px; }
      .dim-grid { grid-template-columns: 1fr; }
      .email-row { flex-direction: column; }
      .rcta-btn { width: 100%; justify-content: center; }
      .results-cta-box { padding: 32px 24px; }
      .profile-dims { grid-template-columns: 1fr; }
      .profile-box { padding: 22px 20px; }
      .intro-benefits-grid { grid-template-columns: 1fr; gap: 10px; }
    }
    @media (max-width: 440px) {
      .intro-dims { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <!-- NAV -->
  <nav class="nav">
    <a href="index.html" class="nav-logo">new<span>.</span>thought</a>
    <div class="nav-right">
      <a href="ressourcen.html" class="nav-back">← Ressourcen</a>
      <a href="programme.html#cta" class="nav-cta">Erstgespräch buchen →</a>
    </div>
  </nav>

  <!-- PROGRESS -->
  <div class="progress-wrap">
    <div class="progress-fill" id="progressFill"></div>
  </div>

  <!-- APP -->
  <main class="main" id="app"></main>

  <script>
  // ═══════════════════════════════════════════════════════════
  //  ICONS (minimalist SVG, stroke-based)
  // ═══════════════════════════════════════════════════════════

  const ICONS = {
    strategie: `<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="3"/><line x1="12" y1="2" x2="12" y2="6"/><line x1="12" y1="18" x2="12" y2="22"/><line x1="2" y1="12" x2="6" y2="12"/><line x1="18" y1="12" x2="22" y2="12"/></svg>`,
    daten: `<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><ellipse cx="12" cy="5" rx="8" ry="3"/><path d="M4 5v5c0 1.66 3.58 3 8 3s8-1.34 8-3V5"/><path d="M4 10v5c0 1.66 3.58 3 8 3s8-1.34 8-3v-5"/></svg>`,
    prozesse: `<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="6" cy="6" r="2.5"/><circle cx="18" cy="6" r="2.5"/><circle cx="12" cy="18" r="2.5"/><line x1="6" y1="8.5" x2="12" y2="15.5"/><line x1="18" y1="8.5" x2="12" y2="15.5"/></svg>`,
    kompetenzen: `<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-3.5 3.6-6 8-6s8 2.5 8 6"/></svg>`,
    governance: `<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3L4 7v5c0 5 4 8.5 8 10 4-1.5 8-5 8-10V7L12 3z"/></svg>`,
    umsetzung: `<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="21" x2="21" y2="21"/><rect x="5" y="13" width="4" height="8" rx="0.5"/><rect x="10" y="8" width="4" height="13" rx="0.5"/><rect x="15" y="4" width="4" height="17" rx="0.5"/></svg>`
  };

  // ═══════════════════════════════════════════════════════════
  //  DATA
  // ═══════════════════════════════════════════════════════════

  const DIMS = [
    {
      id: 'strategie',
      num: 1,
      title: 'Strategie & Führung',
      icon: '🎯',
      desc: 'Verankerung von KI in Strategie, Führung und Ressourcenplanung',
      radarLabel: 'Strategie',
      questions: [
        {
          text: 'Existiert in Ihrem Unternehmen eine explizite KI-Strategie?',
          opts: [
            'KI ist kein priorisiertes Thema auf der Agenda',
            'KI wird diskutiert, aber nicht strategisch verankert',
            'Eine KI-Strategie ist in Ausarbeitung',
            'KI-Strategie existiert, aber ohne klaren Umsetzungsplan',
            'KI-Strategie mit Roadmap, Budget und benanntem Owner'
          ]

  // ═══════════════════════════════════════════════════════════
  //  STATE
  // ═══════════════════════════════════════════════════════════

  let screen = 'intro';
  let answers = {}; // 'dimId_qIdx' -> score 0-4
  let email = '';

  // ═══════════════════════════════════════════════════════════
  //  HELPERS
  // ═══════════════════════════════════════════════════════════

  function rawScore(dimId) {
    const dim = DIMS.find(d => d.id === dimId);
    return dim.questions.reduce((s, _, qi) => s + (answers[`${dimId}_${qi}`] ?? 0), 0);
  }

  function normScore(dimId) {
    return parseFloat(((rawScore(dimId) / 16) * 10).toFixed(1));
  }

  function overallScore() {
    const avg = DIMS.reduce((s, d) => s + normScore(d.id), 0) / DIMS.length;
    return parseFloat(avg.toFixed(1));
  }

  function dimLevel(dimId) {
    const dim = DIMS.find(d => d.id === dimId);
    const r = rawScore(dimId);
    return dim.levels.find(l => r <= l.max) ?? dim.levels[dim.levels.length - 1];
  }

  function answeredCount(dimId) {
    return DIMS.find(d => d.id === dimId).questions
      .filter((_, qi) => answers[`${dimId}_${qi}`] !== undefined).length;
  }

  function allAnswered(dimId) {
    return answeredCount(dimId) === 4;
  }

  function progress() {
    if (screen === 'intro') return 0;
    if (screen === 'results') return 1;
    if (screen === 'email') return 0.92;
    const di = DIMS.findIndex(d => d.id === screen.replace('dim_',''));
    return ((di + answeredCount(DIMS[di].id) / 4) / DIMS.length) * 0.9;
  }

  // ═══════════════════════════════════════════════════════════
  //  PROFILE
  // ═══════════════════════════════════════════════════════════

  function getProfile() {
    const sortedScores = DIMS.map(d => ({
      id: d.id, title: d.title, score: normScore(d.id)
    })).sort((a, b) => b.score - a.score);

    const strongest = sortedScores.slice(0, 2);
    const weakest   = [...sortedScores].reverse().slice(0, 2);
    const total     = overallScore();

    let label, desc;
    if (total < 4) {
      label = 'KI-Starter';
      desc  = 'Ihr Unternehmen steht am Anfang der KI-Reise. Bevor Sie in Technologie investieren, brauchen Sie ein solides Fundament: Strategie, klare Ownership und die richtigen ersten Use Cases. Genau hier liegt der größte Hebel.';
    } else if (total < 6) {
      label = 'KI-Entdecker';
      desc  = 'Sie haben erste Erfahrungen gesammelt – jetzt kommt der entscheidende Übergang: vom Experiment zur systematischen Einführung. Klare Ownership, messbare Ziele und eine Steuerungsstruktur, die Piloten in echte Wirkung überführt.';
    } else if (total < 7.5) {
      label = 'KI-Entwickler';
      desc  = 'Solide Basis mit gezielten Lücken. Sie sind auf dem richtigen Weg, aber einzelne Schwachstellen bremsen den Gesamtfortschritt. Wer diese Lücken gezielt schließt, beschleunigt überproportional.';
    } else {
      label = 'KI-Optimierer';
      desc  = 'Sie sind gut aufgestellt. Der Fokus liegt jetzt auf Skalierung: Portfolio-Management, ROI-Validierung und dem Aufbau einer selbsttragenden KI-Organisation, die mit jeder neuen Anwendung stärker wird.';
    }

    return { label, desc, strongest, weakest };
  }

  // ═══════════════════════════════════════════════════════════
  //  EMAIL NOTIFICATION
  // ═══════════════════════════════════════════════════════════

  async function sendResultEmail(emailAddr) {
    const profile = getProfile();
    const scores  = DIMS.map(d => ({ label: d.title, score: normScore(d.id) }));
    const payload = {
      email:       emailAddr,
      scores:      scores,
      overall:     overallScore(),
      profileType: profile.label,
      profileDesc: profile.desc,
      strongest:   profile.strongest,
      weakest:     profile.weakest
    };
    try {
      const res  = await fetch('send-result.php', {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify(payload)
      });
      const json = await res.json();
      console.log('[KI-Check] E-Mail-Benachrichtigung:', json.success ? '✅ gesendet' : '❌ fehlgeschlagen', json);
    } catch(e) {
      console.warn('[KI-Check] send-result.php nicht erreichbar (lokal oder PHP-Fehler):', e.message);
    }
  }

  // ═══════════════════════════════════════════════════════════
  //  NAVIGATION
  // ═══════════════════════════════════════════════════════════

  function go(to) {
    screen = to;
    render();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  function selectAnswer(dimId, qi, score) {
    const key = `${dimId}_${qi}`;
    answers[key] = score;

    // Patch DOM (no full re-render to avoid scroll jump)
    const card = document.getElementById(`qc_${key}`);
    if (card) {
      card.classList.add('answered');
      card.querySelectorAll('.opt').forEach((el, oi) => {
        el.classList.toggle('sel', oi === score);
      });
    }

    // Update counter + button
    const cnt  = document.getElementById('qstatus');
    const cnt2 = document.getElementById('qstatus2');
    const btn  = document.getElementById('btnNext');
    const ac = answeredCount(dimId);
    if (cnt)  cnt.textContent  = `${ac} von 4 beantwortet`;
    if (cnt2) cnt2.textContent = `${ac} / 4`;
    if (btn)  btn.disabled = !allAnswered(dimId);

    // Progress
    updateProgress();
  }

  function submitEmail() {
    const inp = document.getElementById('emailInput');
    const err = document.getElementById('emailError');
    const val = inp.value.trim();
    if (!val || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(val)) {
      err.classList.add('show');
      inp.focus();
      return;
    }
    email = val;
    err.classList.remove('show');
    sendResultEmail(val); // non-blocking notification
    go('results');
  }

    else if (screen === 'results') renderResults();
  }

  // ── DIMENSION ──────────────────────────────────────────────

    const ac = answeredCount(dimId);

    app.innerHTML = `
      <section class="screen active">
        <div class="quiz-wrap">

            <div class="dim-badge">${ICONS[dimId]}</div>

              <div class="dim-title">${dim.title}</div>

            <div class="dim-counter" id="qstatus">${ac} von 4 beantwortet</div>

  function drawRadar() {
    const canvas = document.getElementById('radarChart');
    if (!canvas || typeof Chart === 'undefined') return;
    new Chart(canvas, {
      type: 'radar',
      data: {
        labels: DIMS.map(d => d.radarLabel),
        datasets: [{
          label: 'Ihr Unternehmen',
          data: DIMS.map(d => normScore(d.id)),
          backgroundColor: 'rgba(255,62,181,0.10)',
          borderColor: '#ff3eb5',
          borderWidth: 2.5,
          pointBackgroundColor: '#ff3eb5',
          pointBorderColor: '#fff',

          pointHoverRadius: 7

        responsive: true,
        scales: {

            min: 0, max: 10,
